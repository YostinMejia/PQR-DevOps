services:
  postgres18_db:
    image: postgres:18
    container_name: postgres18_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - ${POSTGRES_PORTS}
    volumes:
      - postgres18_db_data:/var/lib/postgresql

  pgadmin4:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_LISTEN_PORT=${PGADMIN_PORT}
    ports:
      - ${PGADMIN_PORTS}
    depends_on:
      - postgres18_db

  pqr-management:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pqr-management
    ports:
      - ${APP_DOCKER_PORTS}
    depends_on:
      - postgres18_db
    environment:
      - SERVER_PORT=${SERVER_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
volumes:
  postgres18_db_data:
    name: local-environment_postgres18_db_data
